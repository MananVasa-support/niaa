<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --teal:#00b0a3;--teal-dark:#007f76;
  --black:#0a0a0a;--off-black:#111;--surface:#161616;--surface2:#1e1e1e;
  --white:#fff;--text-muted:rgba(255,255,255,.45);--border:rgba(255,255,255,.08);
  --red:#e53935;
}
html,body{height:100%;font-family:"DM Sans",sans-serif;background:var(--black);color:var(--white);overflow:hidden;}

/* ── TOP BAR ── */
.topbar{
  height:56px;background:var(--off-black);
  border-bottom:2px solid var(--teal);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;position:fixed;top:0;left:0;right:0;z-index:200;
}
.topbar-brand{display:flex;align-items:center;gap:10px;}
.topbar-logo{width:34px;height:34px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(0,176,163,.4);}
.topbar-name{font-family:"Bebas Neue",sans-serif;font-size:1.1rem;letter-spacing:4px;color:rgba(255,255,255,.7);}
.topbar-name span{color:var(--teal);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.tb-btn{
  padding:7px 16px;border:none;border-radius:5px;
  font-family:"DM Sans",sans-serif;font-size:.75rem;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;
  transition:background .2s,transform .1s;
}
.tb-btn:active{transform:scale(.97);}
.tb-menu{background:var(--teal);color:#fff;}
.tb-menu:hover{background:var(--teal-dark);}
.tb-signout{background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);}
.tb-signout:hover{background:#2a2a2a;color:#fff;}

/* ── IFRAME AREA ── */
.iframe-wrap{
  position:fixed;top:56px;left:0;right:0;bottom:0;
  display:none;
}
.iframe-wrap.on{display:block;}
.iframe-wrap iframe{width:100%;height:100%;border:none;}

/* ── MENU OVERLAY ── */
.menu-overlay{
  display:none;position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.8);backdrop-filter:blur(6px);
  align-items:center;justify-content:center;padding:20px;
  overflow-y:auto;
}
.menu-overlay.on{display:flex;}
.menu-box{
  background:var(--off-black);border:1px solid var(--border);
  border-radius:16px;padding:32px;
  width:100%;max-width:860px;
  animation:popIn .22s ease-out both;
  position:relative;
}
@keyframes popIn{from{opacity:0;transform:scale(.94);}to{opacity:1;transform:scale(1);}}

.menu-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
.menu-title-block{}
.menu-eyebrow{font-size:.68rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--teal);margin-bottom:4px;}
.menu-title{font-family:"Bebas Neue",sans-serif;font-size:1.8rem;letter-spacing:2px;color:#fff;}
.menu-close{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text-muted);width:36px;height:36px;border-radius:8px;
  font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:color .2s,background .2s;flex-shrink:0;
}
.menu-close:hover{background:#2a2a2a;color:#fff;}

/* ── CARDS GRID ── */
.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:14px;
  min-height:80px;
}
.card{
  background:var(--surface);border:1.5px solid var(--border);border-radius:12px;
  padding:22px 18px 18px;cursor:pointer;position:relative;
  transition:border-color .2s,transform .2s,box-shadow .2s;
  display:flex;flex-direction:column;gap:8px;
}
.card::before{
  content:"";position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--teal);border-radius:12px 12px 0 0;
  transform:scaleX(0);transition:transform .2s;
}
.card:hover{border-color:rgba(0,176,163,.5);transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,176,163,.12);}
.card:hover::before{transform:scaleX(1);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.card-name{font-size:.92rem;font-weight:700;color:#fff;line-height:1.3;flex:1;}
.card-dots{
  width:28px;height:28px;border-radius:6px;
  background:transparent;border:none;color:var(--text-muted);
  font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .2s,color .2s;flex-shrink:0;
}
.card-dots:hover{background:var(--surface2);color:#fff;}
.card-arrow{font-size:.78rem;color:var(--teal);opacity:0;transition:opacity .2s;}
.card:hover .card-arrow{opacity:1;}

/* Add card */
.card-add{
  background:transparent;border:1.5px dashed rgba(0,176,163,.3);border-radius:12px;
  padding:22px 18px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;transition:border-color .2s,background .2s;min-height:90px;
}
.card-add:hover{border-color:var(--teal);background:rgba(0,176,163,.04);}
.card-add-icon{
  width:36px;height:36px;border-radius:50%;
  background:rgba(0,176,163,.12);color:var(--teal);
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;font-weight:300;transition:background .2s;
}
.card-add:hover .card-add-icon{background:rgba(0,176,163,.2);}
.card-add-label{font-size:.78rem;font-weight:600;color:var(--text-muted);letter-spacing:1px;}

/* ── DROPDOWN MENU ── */
.dropdown{
  position:fixed;z-index:500;
  background:#1e1e1e;border:1px solid var(--border);border-radius:10px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  overflow:hidden;min-width:160px;
  animation:fadeIn .15s ease-out both;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
.dropdown-item{
  display:flex;align-items:center;gap:10px;
  padding:11px 16px;font-size:.84rem;font-weight:500;
  cursor:pointer;transition:background .15s;color:#fff;
  border:none;background:none;width:100%;text-align:left;
  font-family:"DM Sans",sans-serif;
}
.dropdown-item:hover{background:#2a2a2a;}
.dropdown-item.danger{color:var(--red);}
.dropdown-item.danger:hover{background:rgba(229,57,53,.08);}
.dropdown-divider{height:1px;background:var(--border);margin:4px 0;}

/* ── MODAL (add/edit card) ── */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:400;
  background:rgba(0,0,0,.85);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;padding:20px;
}
.modal-overlay.on{display:flex;}
.modal-box{
  background:var(--off-black);border:1px solid var(--border);border-radius:14px;
  padding:28px;width:100%;max-width:540px;
  animation:popIn .2s ease-out both;
}
.modal-title{font-family:"Bebas Neue",sans-serif;font-size:1.4rem;letter-spacing:2px;margin-bottom:20px;color:#fff;}
.modal-field{margin-bottom:16px;}
.modal-label{display:block;font-size:.68rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:7px;}
.modal-input,.modal-textarea{
  width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;
  padding:11px 14px;font-family:"DM Sans",sans-serif;font-size:.9rem;color:#fff;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.modal-input:focus,.modal-textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,176,163,.08);}
.modal-input::placeholder,.modal-textarea::placeholder{color:rgba(255,255,255,.2);}
.modal-textarea{resize:vertical;min-height:100px;max-height:260px;font-size:.82rem;line-height:1.5;}
.modal-note{font-size:.74rem;color:rgba(255,255,255,.25);margin-top:5px;line-height:1.5;}
.modal-footer{display:flex;gap:10px;margin-top:20px;}
.modal-btn{
  flex:1;padding:12px;border:none;border-radius:8px;
  font-family:"DM Sans",sans-serif;font-size:.82rem;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:background .2s;
}
.modal-btn-cancel{background:var(--surface2);color:var(--text-muted);}
.modal-btn-cancel:hover{background:#2a2a2a;color:#fff;}
.modal-btn-save{background:var(--teal);color:#fff;}
.modal-btn-save:hover{background:var(--teal-dark);}

/* ── EMPTY STATE ── */
.empty-state{
  grid-column:1/-1;
  text-align:center;padding:40px 20px;
}
.empty-icon{font-size:2rem;margin-bottom:10px;opacity:.3;}
.empty-text{font-size:.85rem;color:var(--text-muted);line-height:1.7;}

/* ── LOADING ── */
.loading-state{
  grid-column:1/-1;
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:32px;color:var(--text-muted);font-size:.85rem;
}
.loading-dot{
  width:6px;height:6px;border-radius:50%;background:var(--teal);
  animation:blink .9s infinite;
}
.loading-dot:nth-child(2){animation-delay:.2s;}
.loading-dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,100%{opacity:.2;}50%{opacity:1;}}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--off-black);border:1px solid var(--border);border-left:4px solid var(--teal);
  color:#fff;padding:10px 22px;border-radius:8px;font-size:.84rem;
  box-shadow:0 4px 20px rgba(0,0,0,.4);z-index:999;
  opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap;
}
.toast.on{opacity:1;}
.toast.err{border-left-color:var(--red);}

@media(max-width:540px){
  .topbar{padding:0 12px;}
  .topbar-name{display:none;}
  .tb-btn{padding:6px 10px;font-size:.68rem;letter-spacing:1px;}
  .menu-box{padding:20px;}
  .cards-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>

<div class="modal-overlay" id="card-modal">
  <div class="modal-box">
    <div class="modal-title" id="modal-title">Add New Card</div>
    <div class="modal-field">
      <label class="modal-label">Card Name</label>
      <input class="modal-input" id="modal-name" type="text" placeholder="e.g. Niaa Ecosystem Form">
    </div>
    <div class="modal-field">
      <label class="modal-label">HTML Code</label>
      <textarea class="modal-textarea" id="modal-code" placeholder="Paste the full HTML code here..."></textarea>
      <div class="modal-note">Paste the complete HTML file content. It will load inside the page when the card is opened.</div>
    </div>
    <div class="modal-footer">
      <button class="modal-btn modal-btn-cancel" onclick="closeCardModal()">Cancel</button>
      <button class="modal-btn modal-btn-save" onclick="saveCard()">Save Card</button>
    </div>
  </div>
</div>

<!-- ── DROPDOWN MENU ── -->
<div class="dropdown" id="dropdown" style="display:none;">
  <button class="dropdown-item" onclick="dropRename()">&#9998; &nbsp;Rename Card</button>
  <button class="dropdown-item" onclick="dropEdit()">&#128196; &nbsp;Edit HTML Code</button>
  <div class="dropdown-divider"></div>
  <button class="dropdown-item danger" onclick="dropRemove()">&#128465; &nbsp;Remove Card</button>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════
// FIRESTORE — cards collection
// ══════════════════════════════════════════════════
var db;
var CARDS_COL = "niaa_cards";

window.addEventListener("load", function() {
  try {
    // firebase already initialized by auth.js
    db = firebase.firestore();
    loadCards();
  } catch(e) {
    showToast("Could not connect to database.", true);
  }
});

// ── Load cards from Firestore ──
function loadCards() {
  var grid = document.getElementById("cards-grid");
  grid.innerHTML = '<div class="loading-state"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>';

  db.collection(CARDS_COL).orderBy("createdAt").get()
    .then(function(snap) {
      renderCards(snap);
    })
    .catch(function(e) {
      grid.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">Could not load cards.<br>Check your Firestore setup.</div></div>';
    });
}

function renderCards(snap) {
  var grid = document.getElementById("cards-grid");
  grid.innerHTML = "";

  if (snap.empty) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon">🃏</div><div class="empty-text">No cards yet.<br>Click + to add your first card.</div></div>';
  } else {
    snap.forEach(function(doc) {
      var data = doc.data();
      var card = document.createElement("div");
      card.className = "card";
      card.innerHTML =
        "<div class=\"card-top\">" +
          "<div class=\"card-name\">" + esc(data.name) + "</div>" +
          "<button class=\"card-dots\" title=\"Options\">&#8942;</button>" +
        "</div>" +
        "<div class=\"card-arrow\">Open &#8594;</div>";

      // Open card on click (not on dots)
      card.addEventListener("click", function(e) {
        if (e.target.classList.contains("card-dots")) return;
        openCard(doc.id, data);
      });

      // 3-dot menu
      card.querySelector(".card-dots").addEventListener("click", function(e) {
        e.stopPropagation();
        showDropdown(e, doc.id, data);
      });

      grid.appendChild(card);
    });
  }

  // Always add the + button at the end
  var addBtn = document.createElement("div");
  addBtn.className = "card-add";
  addBtn.innerHTML =
    "<div class=\"card-add-icon\">+</div>" +
    "<div class=\"card-add-label\">Add Card</div>";
  addBtn.onclick = function() { openCardModal(); };
  grid.appendChild(addBtn);
}

// ── Open card in iframe ──
function openCard(id, data) {
  closeMenu();
  var wrap = document.getElementById("iframe-wrap");
  var frame = document.getElementById("content-frame");

  // Write HTML into iframe
  var blob = new Blob([data.html], {type: "text/html"});
  var url = URL.createObjectURL(blob);
  frame.src = url;
  wrap.className = "iframe-wrap on";
}

// ── Menu open/close ──
function openMenu() {
  loadCards();
  document.getElementById("menu-overlay").className = "menu-overlay on";
}
function closeMenu() {
  document.getElementById("menu-overlay").className = "menu-overlay";
  closeDropdown();
}

// ── Sign out ──
async function doSignOut() {
  await window.Auth.signOut();
  window.location.replace("index.html");
}

// ── Close menu on overlay click ──
document.getElementById("menu-overlay").addEventListener("click", function(e) {
  if (e.target === this) closeMenu();
});

// ── Dropdown ──
var _dropId = null;
var _dropData = null;

function showDropdown(e, id, data) {
  _dropId = id; _dropData = data;
  var dd = document.getElementById("dropdown");
  dd.style.display = "block";
  var rect = e.target.getBoundingClientRect();
  var ddW = 170;
  var left = rect.right - ddW;
  if (left < 8) left = 8;
  dd.style.left = left + "px";
  dd.style.top = (rect.bottom + 4) + "px";
  e.stopPropagation();
}
function closeDropdown() {
  document.getElementById("dropdown").style.display = "none";
  _dropId = null; _dropData = null;
}
document.addEventListener("click", function() { closeDropdown(); });

function dropRename() {
  closeDropdown();
  openCardModal(_dropId, _dropData, "rename");
}
function dropEdit() {
  closeDropdown();
  openCardModal(_dropId, _dropData, "edit");
}
function dropRemove() {
  var id = _dropId; var name = _dropData ? _dropData.name : "this card";
  closeDropdown();
  if (!confirm("Remove \"" + name + "\"? This cannot be undone.")) return;
  db.collection(CARDS_COL).doc(id).delete()
    .then(function() { showToast("Card removed."); loadCards(); })
    .catch(function() { showToast("Could not remove card.", true); });
}

// ── Add / Edit card modal ──
var _editId = null;
var _editMode = null; // "add" | "rename" | "edit"

function openCardModal(id, data, mode) {
  _editId = id || null;
  _editMode = mode || "add";
  var title = document.getElementById("modal-title");
  var nameInp = document.getElementById("modal-name");
  var codeInp = document.getElementById("modal-code");
  var codeField = codeInp.closest(".modal-field");

  if (_editMode === "add") {
    title.textContent = "Add New Card";
    nameInp.value = "";
    codeInp.value = "";
    codeField.style.display = "";
  } else if (_editMode === "rename") {
    title.textContent = "Rename Card";
    nameInp.value = data ? data.name : "";
    codeInp.value = "";
    codeField.style.display = "none";
  } else if (_editMode === "edit") {
    title.textContent = "Edit HTML Code";
    nameInp.value = data ? data.name : "";
    codeInp.value = data ? data.html : "";
    codeField.style.display = "";
  }

  document.getElementById("card-modal").className = "modal-overlay on";
  setTimeout(function() { nameInp.focus(); }, 100);
}
function closeCardModal() {
  document.getElementById("card-modal").className = "modal-overlay";
  _editId = null; _editMode = null;
}

function saveCard() {
  var name = document.getElementById("modal-name").value.trim();
  var code = document.getElementById("modal-code").value.trim();

  if (!name) { showToast("Please enter a card name.", true); return; }

  var payload = {};

  if (_editMode === "add") {
    if (!code) { showToast("Please paste the HTML code.", true); return; }
    payload = {name: name, html: code, createdAt: firebase.firestore.FieldValue.serverTimestamp()};
    db.collection(CARDS_COL).add(payload)
      .then(function() { showToast("Card added!"); closeCardModal(); loadCards(); })
      .catch(function() { showToast("Could not save card.", true); });
  } else if (_editMode === "rename") {
    db.collection(CARDS_COL).doc(_editId).update({name: name})
      .then(function() { showToast("Card renamed!"); closeCardModal(); loadCards(); })
      .catch(function() { showToast("Could not rename card.", true); });
  } else if (_editMode === "edit") {
    if (!code) { showToast("Please paste the HTML code.", true); return; }
    db.collection(CARDS_COL).doc(_editId).update({name: name, html: code})
      .then(function() { showToast("Card updated!"); closeCardModal(); loadCards(); })
      .catch(function() { showToast("Could not update card.", true); });
  }
}

// ── Escape HTML ──
function esc(str) {
  return String(str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── Toast ──
var _toastTimer;
function showToast(msg, err) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast on" + (err ? " err" : "");
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() { t.className = "toast"; }, 3000);
}
</script>
